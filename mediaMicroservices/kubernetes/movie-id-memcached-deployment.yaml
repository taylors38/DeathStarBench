apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-kompose.yml -o kubernetes/ -n media
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: movie-id-memcached
  name: movie-id-memcached
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: movie-id-memcached
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-kompose.yml -o kubernetes/ -n media
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: movie-id-memcached
    spec:
      containers:
        - image: memcached
          name: movie-id-memcached
          ports:
            - containerPort: 11211
              protocol: TCP
      hostname: movie-id-memcached
      restartPolicy: Always
