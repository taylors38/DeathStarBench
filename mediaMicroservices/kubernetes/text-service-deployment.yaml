apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-kompose.yml -o kubernetes/ -n media
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: text-service
  name: text-service
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: text-service
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-kompose.yml -o kubernetes/ -n media
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: text-service
    spec:
      containers:
        - command:
            - TextService
          image: yg397/media-microservices
          name: text-service
          ports:
            - containerPort: 9090
              protocol: TCP
      hostname: text-service
      restartPolicy: Always
