apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-kompose.yml -o kubernetes/ -n media
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: user-review-mongodb
  name: user-review-mongodb
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: user-review-mongodb
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-kompose.yml -o kubernetes/ -n media
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: user-review-mongodb
    spec:
      containers:
        - image: mongo:4.4.6
          name: user-review-mongodb
          ports:
            - containerPort: 27017
              protocol: TCP
      hostname: user-review-mongodb
      restartPolicy: Always
